name: Deploy VitePress

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # 必须有写权限，才能修改index.md
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须，否则拿不到git历史

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 核心：统计信息 → 直接生成原生Markdown表格 → 写入index.md
      - name: Generate site info markdown
        run: |
          # 1. 统计基础信息
          HASH=$(git rev-parse --short HEAD)
          AUTHOR=${{ github.actor }}
          MSG=$(git log -1 --format=%s | cut -c1-50)
          BUILD_TIME=$(TZ=Asia/Shanghai date '+%Y/%m/%d %H:%M:%S')
          
          # 2. 统计md文件（排除node_modules和.git，避免扫无关文件）
          FILES=$(find . -name "*.md" ! -path "./node_modules/*" ! -path "./.git/*" | wc -l)
          FILES=${FILES:-0}  # 防空值
          
          # 3. 统计字数（排除frontmatter，只算正文）
          TOTAL_WORDS=$(node -e '
            const fs = require("fs");
            const files = process.argv.slice(1);
            let total = 0;
            files.forEach(f => {
              const content = fs.readFileSync(f, "utf-8").replace(/^---[\s\S]+?---\n+/, "");
              const cn = (content.match(/[\u4e00-\u9fa5]/g) || []).length;
              const en = (content.match(/[a-zA-Z]+/g) || []).length;
              total += cn + en;
            });
            console.log(total);
          ' $(find . -name "*.md" ! -path "./node_modules/*" ! -path "./.git/*"))
          TOTAL_WORDS=${TOTAL_WORDS:-0}
          
          AVG_WORDS=$((FILES > 0 ? TOTAL_WORDS / FILES : 0))

          # 4. 先删除旧的站点信息（只删标记内的内容，不污染源文件其他部分）
          sed -i '/<!-- SITE_INFO_START -->/,/<!-- SITE_INFO_END -->/d' index.md
          
          # 5. 追加新的原生Markdown表格（完全静态，和手写的一模一样）
          cat << EOF >> index.md

<!-- SITE_INFO_START -->
# 站点信息

| 构建时间 | 提交者 | 提交信息 | 提交哈希 | 文件数 | 总字数 | 每文件平均字数 |
| :--- | :--- | :--- | :--- | :--- | :--- | :--- |
| ${BUILD_TIME} | ${AUTHOR} | ${MSG} | ${HASH} | ${FILES} | ${TOTAL_WORDS} | ${AVG_WORDS} |
<!-- SITE_INFO_END -->
EOF

      - run: npm install
      - run: npm run docs:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
