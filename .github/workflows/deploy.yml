name: Deploy Static Site

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install feedgen
          pip install markdown

      # 1. 编译 Markdown（生成 index.html 等）
      - name: Compile Markdown
        run: python compile.py

      # ✅ 2. 准备 RSS/Sitemap 所需的“假环境”
      - name: Prepare required files
        run: |
          # 确保 src 目录存在
          mkdir -p src
          
          # 把根目录的 index.html 复制成 src/README.md
          # RSS 脚本会读取这个文件来获取主页信息
          cp index.html src/README.md
          
          # 确保 rss.xml 和 sitemap.xml 的输出目录（当前目录）是干净的
          rm -f rss.xml sitemap.xml

      # 3. 生成 RSS（现在 src/README.md 存在了）
      - name: Generate RSS
        run: python generate_rss.py

      # 4. 生成 Sitemap
      - name: Generate Sitemap
        run: python generate_sitemap.py

      # 5. 收集并注入变量
      - name: Collect build metadata
        run: |
          START_DATE="2026-06-18"
          BUILD_TIME=$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M:%S")
          SHORT_HASH=${GITHUB_SHA::7}
          ACTOR=${{ github.actor }}
          LAST_MSG=$(git log -1 --pretty=%s)
          
          # 统计根目录的 html 文件
          TOTAL_FILES=$(find . -maxdepth 1 -name "*.html" | wc -l)
          TOTAL_WORDS=$(find . -maxdepth 1 -name "*.html" -exec cat {} \; | wc -c)
          AVG_CHARS=$((TOTAL_WORDS / TOTAL_FILES))
          
          START_SEC=$(date -d "$START_DATE" +%s)
          NOW_SEC=$(date +%s)
          RUN_DAYS=$(( (NOW_SEC - START_SEC) / 86400 ))
          
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          echo "SHORT_HASH=$SHORT_HASH" >> $GITHUB_ENV
          echo "ACTOR=$ACTOR" >> $GITHUB_ENV
          echo "LAST_MSG=$LAST_MSG" >> $GITHUB_ENV
          echo "TOTAL_FILES=$TOTAL_FILES" >> $GITHUB_ENV
          echo "TOTAL_WORDS=$TOTAL_WORDS" >> $GITHUB_ENV
          echo "AVG_CHARS=$AVG_CHARS" >> $GITHUB_ENV
          echo "RUN_DAYS=$RUN_DAYS" >> $GITHUB_ENV

      - name: Inject metadata
        run: |
          sed -i "s/{{BUILD_TIME}}/${{ env.BUILD_TIME }}/g" index.html
          sed -i "s/{{SHORT_HASH}}/${{ env.SHORT_HASH }}/g" index.html
          sed -i "s/{{ACTOR}}/${{ env.ACTOR }}/g" index.html
          sed -i "s/{{LAST_MSG}}/${{ env.LAST_MSG }}/g" index.html
          sed -i "s/{{TOTAL_FILES}}/${{ env.TOTAL_FILES }}/g" index.html
          sed -i "s/{{TOTAL_WORDS}}/${{ env.TOTAL_WORDS }}/g" index.html
          sed -i "s/{{AVG_CHARS}}/${{ env.AVG_CHARS }}/g" index.html
          sed -i "s/{{RUN_DAYS}}/${{ env.RUN_DAYS }}/g" index.html

      # 6. 部署
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        uses: actions/deploy-pages@v4
