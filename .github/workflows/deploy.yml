name: Deploy VitePress Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 统计信息 + 注入Markdown表格（单行echo，无格式风险）
      - name: Inject site info markdown
        run: |
          HASH=$(git rev-parse --short HEAD)
          AUTHOR=${{ github.actor }}
          MSG=$(git log -1 --format=%s)
          BUILD_TIME=$(TZ=Asia/Shanghai date '+%Y/%m/%d %H:%M:%S')
          FILES=$(find . -name "*.md" ! -path "./node_modules/*" ! -path "./.git/*" | wc -l)
          TOTAL_WORDS=$(node -e "const fs=require('fs');const f=process.argv;let t=0;f.slice(1).forEach(x=>{const c=fs.readFileSync(x,'utf-8').replace(/^---[\s\S]+?---\n+/,'');t+=(c.match(/[\u4e00-\u9fa5]/g)||[]).length+(c.match(/[a-zA-Z]+/g)||[]).length});console.log(t)" $(find . -name "*.md" ! -path "./node_modules/*" ! -path "./.git/*"))
          AVG_WORDS=$((FILES > 0 ? TOTAL_WORDS / FILES : 0))
          # 清除旧表格
          sed -i '/<!-- SITE_INFO_START -->/,/<!-- SITE_INFO_END -->/d' index.md
          # 竖式表格：每行一个字段，左字段名右值
          echo "" >> index.md
          echo "<!-- SITE_INFO_START -->" >> index.md
          echo "## 站点信息" >> index.md
          echo "" >> index.md
          echo "| 字段 | 值 |" >> index.md
          echo "| :--- | :--- |" >> index.md
          echo "| 构建时间 | ${BUILD_TIME} |" >> index.md
          echo "| 提交者 | ${AUTHOR} |" >> index.md
          echo "| 提交信息 | ${MSG} |" >> index.md
          echo "| 提交哈希 | ${HASH} |" >> index.md
          echo "| 文件数 | ${FILES} |" >> index.md
          echo "| 总字数 | ${TOTAL_WORDS} |" >> index.md
          echo "| 每文件平均字数 | ${AVG_WORDS} |" >> index.md
          echo "" >> index.md
          echo "<!-- SITE_INFO_END -->" >> index.md

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build VitePress site
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
