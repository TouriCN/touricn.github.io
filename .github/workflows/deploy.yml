name: Deploy VitePress

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须保留！否则拿不到git提交历史

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 核心：统计所有站点信息并导出为环境变量
      - name: Collect site info
        run: |
          HASH=$(git rev-parse --short HEAD)
          AUTHOR=${{ github.actor }}
          MSG=$(git log -1 --format=%s | cut -c1-50)
          BUILD_TIME=$(TZ=Asia/Shanghai date '+%Y/%m/%d %H:%M:%S')
          # 找当前目录下的md文件，排除node_modules和git目录（避免扫无关文件）
          FILES=$(find . -name "*.md" ! -path "./node_modules/*" ! -path "./.git/*" | wc -l)
          TOTAL_WORDS=$(node -e '
            const fs = require("fs");
            const files = process.argv.slice(1);
            let total = 0;
            files.forEach(f => {
              const content = fs.readFileSync(f, "utf-8").replace(/^---[\s\S]+?---\n+/, "");
              const cn = (content.match(/[\u4e00-\u9fa5]/g) || []).length;
              const en = (content.match(/[a-zA-Z]+/g) || []).length;
              total += cn + en;
            });
            console.log(total);
          ' $(find . -name "*.md" ! -path "./node_modules/*" ! -path "./.git/*"))
          AVG_WORDS=$((FILES > 0 ? TOTAL_WORDS / FILES : 0))
          # 导出环境变量
          echo "SITE_HASH=$HASH" >> $GITHUB_ENV
          echo "SITE_AUTHOR=$AUTHOR" >> $GITHUB_ENV
          echo "SITE_MSG=$MSG" >> $GITHUB_ENV
          echo "SITE_BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          echo "SITE_FILES=$FILES" >> $GITHUB_ENV
          echo "SITE_TOTAL_WORDS=$TOTAL_WORDS" >> $GITHUB_ENV
          echo "SITE_AVG_WORDS=$AVG_WORDS" >> $GITHUB_ENV

      - run: npm install
      - run: npm run docs:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
