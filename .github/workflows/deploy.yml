name: Deploy VitePress Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 核心：用echo单行追加，彻底避免heredoc的缩进坑
      - name: Inject site info markdown
        run: |
          HASH=$(git rev-parse --short HEAD)
          AUTHOR=${{ github.actor }}
          MSG=$(git log -1 --format=%s)
          BUILD_TIME=$(TZ=Asia/Shanghai date '+%Y/%m/%d %H:%M:%S')
          FILES=$(find . -name "*.md" ! -path "./node_modules/*" ! -path "./.git/*" | wc -l)
          # 清除旧表格，避免重复
          sed -i '/<!-- SITE_INFO_START -->/,/<!-- SITE_INFO_END -->/d' index.md
          # 逐行追加Markdown内容，无格式风险
          echo "" >> index.md
          echo "<!-- SITE_INFO_START -->" >> index.md
          echo "## 站点信息" >> index.md
          echo "" >> index.md
          echo "| 构建时间 | 提交者 | 提交信息 | 提交哈希 | 文件数 |" >> index.md
          echo "| :--- | :--- | :--- | :--- | :--- |" >> index.md
          echo "| ${BUILD_TIME} | ${AUTHOR} | ${MSG} | ${HASH} | ${FILES} |" >> index.md
          echo "" >> index.md
          echo "<!-- SITE_INFO_END -->" >> index.md

      - name: Install dependencies
        run: npm install

      - name: Build VitePress site
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
